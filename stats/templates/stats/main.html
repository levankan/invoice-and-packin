{% extends "core/base.html" %}

{% block content %}
<div style="padding: 30px; max-width: 900px; margin: auto;">

    <h2 style="margin-bottom: 10px;">📊 Statistics</h2>
    <p style="color: #6b7280; margin-bottom: 30px;">
        Select analysis area
    </p>

    <div style="
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        grid-auto-rows: 1fr;
        gap: 20px;
    ">

        <!-- Dashboard -->
        <a href="{% url 'stats:dashboard' %}" style="text-decoration: none; color: inherit;">
            <div style="
                background: white;
                border-radius: 16px;
                padding: 24px;
                border: 1px solid #e5e7eb;
                box-shadow: 0 8px 25px rgba(15, 23, 42, 0.05);
                transition: 0.2s;
                height: 100%;
                min-height: 180px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            "
            onmouseover="this.style.transform='translateY(-3px)'"
            onmouseout="this.style.transform='translateY(0)'"
            >
                <div>
                    <div style="font-size: 28px; margin-bottom: 10px;">📊</div>
                    <h4 style="margin: 0 0 8px 0;">Shipments Overview</h4>
                    <p style="margin: 0; font-size: 14px; color: #6b7280; line-height: 1.5;">
                        Shipment overview and statistics
                    </p>
                </div>
            </div>
        </a>

        <!-- Vendor Analysis -->
        <div style="
            background: #f9fafb;
            border-radius: 16px;
            padding: 24px;
            border: 1px dashed #d1d5db;
            color: #9ca3af;
            height: 100%;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        ">
            <div>
                <div style="font-size: 28px; margin-bottom: 10px;">🏭</div>
                <h4 style="margin: 0 0 8px 0;">Vendor Analysis</h4>
                <p style="margin: 0; font-size: 14px; line-height: 1.5;">
                    Coming soon
                </p>
            </div>
        </div>

        <!-- Cost Analysis -->
        <a href="{% url 'stats:cost' %}" style="text-decoration: none; color: inherit;">
            <div style="
                background: white;
                border-radius: 16px;
                padding: 24px;
                border: 1px solid #e5e7eb;
                box-shadow: 0 8px 25px rgba(15, 23, 42, 0.05);
                transition: 0.2s;
                height: 100%;
                min-height: 180px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            "
            onmouseover="this.style.transform='translateY(-3px)'"
            onmouseout="this.style.transform='translateY(0)'"
            >
                <div>
                    <div style="font-size: 28px; margin-bottom: 10px;">💰</div>
                    <h4 style="margin: 0 0 8px 0;">Cost Analysis</h4>
                    <p style="margin: 0; font-size: 14px; color: #6b7280; line-height: 1.5;">
                        Transportation cost vs goods value
                    </p>
                </div>
            </div>
        </a>

    </div>

</div>
{% endblock %}
