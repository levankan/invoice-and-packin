{% extends "core/base.html" %}

{% block content %}
<div style="padding: 30px; max-width: 800px; margin: auto;">

    <h2 style="margin-bottom: 10px;">📊 Statistics</h2>
    <p style="color: #6b7280; margin-bottom: 30px;">
        Select analysis area
    </p>

    <div style="
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
    ">

        <!-- Dashboard -->
        <a href="{% url 'stats:dashboard' %}" style="text-decoration: none;">
            <div style="
                background: white;
                border-radius: 16px;
                padding: 24px;
                border: 1px solid #e5e7eb;
                box-shadow: 0 8px 25px rgba(15, 23, 42, 0.05);
                transition: 0.2s;
            "
            onmouseover="this.style.transform='translateY(-3px)'"
            onmouseout="this.style.transform='translateY(0)'"
            >
                <div style="font-size: 28px; margin-bottom: 10px;">📊</div>
                <h4 style="margin: 0 0 8px 0;">Shipments overview</h4>
                <p style="margin: 0; font-size: 14px; color: #6b7280;">
                    Shipment overview and statistics
                </p>
            </div>
        </a>

        <!-- Future: Cost Analysis -->
        <div style="
            background: #f9fafb;
            border-radius: 16px;
            padding: 24px;
            border: 1px dashed #d1d5db;
            color: #9ca3af;
        ">
            <div style="font-size: 28px; margin-bottom: 10px;">💰</div>
            <h4 style="margin: 0 0 8px 0;">Cost Analysis</h4>
            <p style="margin: 0; font-size: 14px;">
                Coming soon
            </p>
        </div>

        <!-- Future: Vendor Analysis -->
        <div style="
            background: #f9fafb;
            border-radius: 16px;
            padding: 24px;
            border: 1px dashed #d1d5db;
            color: #9ca3af;
        ">
            <div style="font-size: 28px; margin-bottom: 10px;">🏭</div>
            <h4 style="margin: 0 0 8px 0;">Vendor Analysis</h4>
            <p style="margin: 0; font-size: 14px;">
                Coming soon
            </p>
        </div>

        <a href="{% url 'stats:cost' %}" style="text-decoration: none;">
            <div style="
                background: white;
                border-radius: 16px;
                padding: 24px;
                border: 1px solid #e5e7eb;
                box-shadow: 0 8px 25px rgba(15, 23, 42, 0.05);
            ">
                <div style="font-size: 28px; margin-bottom: 10px;">💰</div>
                <h4 style="margin: 0 0 8px 0;">Cost Analysis</h4>
                <p style="margin: 0; font-size: 14px; color: #6b7280;">
                    Transportation cost vs goods value
                </p>
            </div>
        </a>

    </div>

</div>
{% endblock %}
